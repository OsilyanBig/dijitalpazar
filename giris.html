<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | XXX Yazılım</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']},colors:{dark:'#0A0E27'}}}}</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;overflow-y:auto}
        .gradient-text{background:linear-gradient(135deg,#4F46E5,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .btn-primary{background:linear-gradient(135deg,#4F46E5,#7C3AED);position:relative;overflow:hidden;transition:all 0.3s ease}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 15px 35px -5px rgba(79,70,229,0.4)}
        .input-field{width:100%;padding:13px 16px;border-radius:12px;background:#F8FAFC;border:1.5px solid #E2E8F0;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;outline:none;color:#0F172A}
        .input-field:focus{border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,0.1);background:#fff}
        .input-field::placeholder{color:#94A3B8}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .animate-fade-up{animation:fadeUp 0.6s ease forwards}
        @keyframes spin{to{transform:rotate(360deg)}}.animate-spin{animation:spin 1s linear infinite}
        @keyframes blob{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:50% 60% 30% 60%/30% 60% 70% 40%}}
        .animate-blob{animation:blob 8s ease-in-out infinite}
        .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94A3B8;padding:4px;display:flex;align-items:center}
        .eye-btn:hover{color:#4F46E5}
    </style>
</head>
<body class="bg-dark min-h-screen">

    <!-- BG Effects -->
    <div class="fixed inset-0 bg-dark pointer-events-none">
        <div class="absolute top-1/4 -left-32 w-[500px] h-[500px] bg-indigo-600/15 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-1/4 -right-32 w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] animate-blob" style="animation-delay:3s"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image:linear-gradient(rgba(255,255,255,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.1) 1px,transparent 1px);background-size:60px 60px"></div>
    </div>

    <!-- Scrollable Container -->
    <div class="relative z-10 min-h-screen flex flex-col items-center justify-start py-10 px-4">

        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-up">
            <a href="index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/25">
                    <span class="text-white font-black text-xl">X</span>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-xl font-bold text-white">XXX Yazılım</span>
                    <span class="text-xs text-indigo-400">Dijital Çözümler</span>
                </div>
            </a>
        </div>

        <!-- Card -->
        <div class="w-full max-w-md animate-fade-up" style="animation-delay:0.1s">
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

                <!-- Tabs -->
                <div class="grid grid-cols-2 border-b border-gray-100">
                    <button id="tabLogin" onclick="showTab('login')"
                        class="py-4 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition-all">
                        Giriş Yap
                    </button>
                    <button id="tabRegister" onclick="showTab('register')"
                        class="py-4 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all">
                        Kayıt Ol
                    </button>
                </div>

                <div class="p-7">

                    <!-- Başarı Mesajı -->
                    <div id="successMsg" class="hidden mb-5 p-4 bg-green-50 border border-green-200 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-green-100 rounded-xl flex items-center justify-center flex-shrink-0">✅</div>
                            <p id="successText" class="text-green-700 text-sm font-semibold"></p>
                        </div>
                    </div>

                    <!-- Hata Mesajı -->
                    <div id="errorMsg" class="hidden mb-5 p-4 bg-red-50 border border-red-200 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">❌</div>
                            <p id="errorText" class="text-red-700 text-sm font-semibold"></p>
                        </div>
                    </div>

                    <!-- ===== GİRİŞ FORMU ===== -->
                    <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">E-posta *</label>
                            <input type="email" id="loginEmail" required placeholder="ornek@email.com" class="input-field">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Şifre *</label>
                            <div class="relative">
                                <input type="password" id="loginPassword" required placeholder="••••••••" class="input-field pr-12">
                                <button type="button" class="eye-btn" onclick="togglePass('loginPassword', this)">
                                    <svg class="w-5 h-5 eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    <svg class="w-5 h-5 eye-hide hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="loginBtn"
                            class="w-full btn-primary text-white px-6 py-4 rounded-xl text-base font-bold flex items-center justify-center gap-2 mt-2">
                            <span id="loginBtnText">Giriş Yap</span>
                            <svg id="loginBtnLoader" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>

                        <button type="button" onclick="resetPassword()"
                            class="w-full text-center text-sm text-indigo-600 font-semibold hover:text-indigo-700 transition-colors py-1">
                            Şifremi Unuttum
                        </button>
                    </form>

                    <!-- ===== KAYIT FORMU ===== -->
                    <form id="registerForm" class="hidden space-y-4">

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Ad *</label>
                                <input type="text" id="regFirstName" required placeholder="Ahmet" class="input-field">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Soyad *</label>
                                <input type="text" id="regLastName" required placeholder="Yılmaz" class="input-field">
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Telefon *</label>
                            <input type="tel" id="regPhone" required placeholder="05XX XXX XX XX" class="input-field">
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">E-posta *</label>
                            <input type="email" id="regEmail" required placeholder="ornek@email.com" class="input-field">
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Şifre * (en az 6 karakter)</label>
                            <div class="relative">
                                <input type="password" id="regPassword" required minlength="6" placeholder="••••••••" class="input-field pr-12">
                                <button type="button" class="eye-btn" onclick="togglePass('regPassword', this)">
                                    <svg class="w-5 h-5 eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    <svg class="w-5 h-5 eye-hide hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Şifre Tekrar *</label>
                            <div class="relative">
                                <input type="password" id="regPasswordConfirm" required minlength="6" placeholder="••••••••" class="input-field pr-12">
                                <button type="button" class="eye-btn" onclick="togglePass('regPasswordConfirm', this)">
                                    <svg class="w-5 h-5 eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    <svg class="w-5 h-5 eye-hide hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                                </button>
                            </div>
                        </div>

                        <!-- KVKK -->
                        <div class="flex items-start gap-3 bg-gray-50 rounded-xl p-3">
                            <input type="checkbox" id="regTerms" required
                                class="mt-0.5 w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 flex-shrink-0 cursor-pointer">
                            <label for="regTerms" class="text-xs text-gray-500 leading-relaxed cursor-pointer">
                                <a href="#" class="text-indigo-600 font-semibold hover:underline">Kullanım şartlarını</a> ve
                                <a href="#" class="text-indigo-600 font-semibold hover:underline">gizlilik politikasını</a>
                                okudum, kabul ediyorum.
                            </label>
                        </div>

                        <!-- KAYIT OL BUTONU -->
                        <button type="submit" id="regBtn"
                            class="w-full btn-primary text-white px-6 py-4 rounded-xl text-base font-bold flex items-center justify-center gap-2">
                            <span id="regBtnText">Kayıt Ol</span>
                            <svg id="regBtnLoader" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>

                        <!-- Giriş Yap Linki -->
                        <p class="text-center text-sm text-gray-400 pb-2">
                            Zaten hesabınız var mı?
                            <button type="button" onclick="showTab('login')" class="text-indigo-600 font-bold hover:underline">Giriş Yap</button>
                        </p>
                    </form>

                </div>
            </div>

            <!-- Alt Link -->
            <div class="text-center mt-6">
                <a href="index.html" class="text-white/40 text-sm hover:text-white/70 transition-colors inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
                    Ana Sayfaya Dön
                </a>
            </div>
        </div>

    </div><!-- end scrollable container -->


    <!-- ===== FIREBASE ===== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZgHuXY6njck4Kqn_rnCoX67Ssw6b9ig4",
            authDomain: "dijital-pazar-3cc34.firebaseapp.com",
            projectId: "dijital-pazar-3cc34",
            storageBucket: "dijital-pazar-3cc34.firebasestorage.app",
            messagingSenderId: "519713206128",
            appId: "1:519713206128:web:4d1f541d1b469eeb8069b5"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // Zaten giriş yapmışsa panele yönlendir
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'panel.html';
        });

        // ========== KAYIT OL ==========
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const firstName    = document.getElementById('regFirstName').value.trim();
            const lastName     = document.getElementById('regLastName').value.trim();
            const phone        = document.getElementById('regPhone').value.trim();
            const email        = document.getElementById('regEmail').value.trim();
            const password     = document.getElementById('regPassword').value;
            const passwordConf = document.getElementById('regPasswordConfirm').value;

            if (!firstName || !lastName || !phone || !email || !password) {
                showError('Lütfen tüm zorunlu alanları doldurun.'); return;
            }
            if (password !== passwordConf) {
                showError('Şifreler eşleşmiyor!'); return;
            }
            if (password.length < 6) {
                showError('Şifre en az 6 karakter olmalıdır.'); return;
            }

            setLoading('reg', true);

            try {
                // Auth kullanıcısı oluştur
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                const uid  = cred.user.uid;
                console.log('✅ Auth başarılı, UID:', uid);

                // Firestore'a yaz
                await setDoc(doc(db, "users", uid), {
                    firstName : firstName,
                    lastName  : lastName,
                    fullName  : firstName + ' ' + lastName,
                    email     : email,
                    phone     : phone,
                    role      : 'customer',
                    createdAt : serverTimestamp()
                });
                console.log('✅ Firestore yazma başarılı!');

                showSuccess('Hesabınız oluşturuldu! Yönlendiriliyorsunuz...');
                setTimeout(() => { window.location.href = 'panel.html'; }, 1500);

            } catch (err) {
                console.error('❌ Hata:', err.code, err.message);
                const msgs = {
                    'auth/email-already-in-use' : 'Bu e-posta adresi zaten kullanılıyor.',
                    'auth/weak-password'         : 'Şifre en az 6 karakter olmalıdır.',
                    'auth/invalid-email'         : 'Geçersiz e-posta adresi.',
                    'permission-denied'          : 'Firestore izin hatası! Rules ayarlarını kontrol edin.',
                };
                showError(msgs[err.code] || 'Bir hata oluştu: ' + err.message);
            } finally {
                setLoading('reg', false);
            }
        });

        // ========== GİRİŞ YAP ==========
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email    = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('E-posta ve şifrenizi girin.'); return;
            }

            setLoading('login', true);

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showSuccess('Giriş başarılı! Yönlendiriliyorsunuz...');
                setTimeout(() => { window.location.href = 'panel.html'; }, 1000);

            } catch (err) {
                console.error('❌ Giriş hatası:', err.code);
                const msgs = {
                    'auth/user-not-found'     : 'Bu e-posta ile kayıtlı hesap bulunamadı.',
                    'auth/wrong-password'     : 'Şifre yanlış.',
                    'auth/invalid-credential' : 'E-posta veya şifre hatalı.',
                    'auth/too-many-requests'  : 'Çok fazla deneme. Lütfen biraz bekleyin.',
                    'auth/invalid-email'      : 'Geçersiz e-posta adresi.',
                };
                showError(msgs[err.code] || 'Giriş başarısız: ' + err.message);
            } finally {
                setLoading('login', false);
            }
        });

        // ========== ŞİFRE SIFIRLAMA ==========
        window.resetPassword = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) { showError('Önce e-posta adresinizi girin.'); return; }
            hideMessages();
            try {
                await sendPasswordResetEmail(auth, email);
                showSuccess('Şifre sıfırlama bağlantısı e-postanıza gönderildi.');
            } catch (err) {
                showError(err.code === 'auth/user-not-found'
                    ? 'Bu e-posta ile kayıtlı hesap bulunamadı.'
                    : 'Bir hata oluştu. Tekrar deneyin.');
            }
        };

        // ========== YARDIMCI ==========
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
            document.getElementById('errorMsg').scrollIntoView({ behavior:'smooth', block:'nearest' });
        }
        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMsg').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }
        function hideMessages() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
        function setLoading(type, state) {
            document.getElementById(type + 'Btn').disabled = state;
            document.getElementById(type + 'BtnText').textContent = state
                ? (type === 'login' ? 'Giriş yapılıyor...' : 'Hesap oluşturuluyor...')
                : (type === 'login' ? 'Giriş Yap' : 'Kayıt Ol');
            document.getElementById(type + 'BtnLoader').classList.toggle('hidden', !state);
        }

        window.showError   = showError;
        window.showSuccess = showSuccess;
    </script>

    <!-- ===== NORMAL JS ===== -->
    <script>
        // Tab değiştir
        function showTab(tab) {
            const isLogin = tab === 'login';

            document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
            document.getElementById('registerForm').classList.toggle('hidden', isLogin);

            // Tab buton stilleri
            const tabLogin    = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (isLogin) {
                tabLogin.classList.add('text-indigo-600','border-indigo-600');
                tabLogin.classList.remove('text-gray-400','border-transparent');
                tabRegister.classList.add('text-gray-400','border-transparent');
                tabRegister.classList.remove('text-indigo-600','border-indigo-600');
            } else {
                tabRegister.classList.add('text-indigo-600','border-indigo-600');
                tabRegister.classList.remove('text-gray-400','border-transparent');
                tabLogin.classList.add('text-gray-400','border-transparent');
                tabLogin.classList.remove('text-indigo-600','border-indigo-600');
            }

            // Mesajları temizle
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            // Yukarı scroll
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Şifre göster/gizle
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const show  = btn.querySelector('.eye-show');
            const hide  = btn.querySelector('.eye-hide');
            if (input.type === 'password') {
                input.type = 'text';
                show.classList.add('hidden');
                hide.classList.remove('hidden');
            } else {
                input.type = 'password';
                show.classList.remove('hidden');
                hide.classList.add('hidden');
            }
        }

        // URL'de ?tab=register varsa kayıt formunu göster
        if (new URLSearchParams(window.location.search).get('tab') === 'register') {
            showTab('register');
        }
    </script>

</body>
</html>
