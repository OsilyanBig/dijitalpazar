<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | DijitalPazar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{dark:'#0C1222',gold:'#D4A853'}}}}</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0C1222;color:#fff;overflow-x:hidden}
        ::selection{background:rgba(212,168,83,0.3)}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#D4A853,#B8860B);border-radius:10px}
        .text-gradient-gold{background:linear-gradient(135deg,#D4A853,#F5D88E,#D4A853);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .btn-gold{background:linear-gradient(135deg,#D4A853,#C4973D);color:#0C1222;font-weight:700;border:none;cursor:pointer;transition:all 0.3s}
        .btn-gold:hover{box-shadow:0 15px 40px -10px rgba(212,168,83,0.4);transform:translateY(-1px)}
        .glass{background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.04)}
        .gold-badge{background:linear-gradient(135deg,rgba(212,168,83,0.12),rgba(212,168,83,0.04));border:1px solid rgba(212,168,83,0.18);color:#D4A853}
        .tab-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;outline:none;transition:all 0.2s;white-space:nowrap}
        .tab-btn.active{background:linear-gradient(135deg,#D4A853,#C4973D);color:#0C1222}
        .tab-btn:not(.active){background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.04)}
        .tab-btn:not(.active):hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5)}
        .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700}
        .input-sm{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);font-size:12px;font-family:'Inter',sans-serif;outline:none;color:#fff;transition:all 0.2s}
        .input-sm:focus{border-color:rgba(212,168,83,0.3)}
        .card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:16px;transition:all 0.2s}
        .card:hover{border-color:rgba(255,255,255,0.06);background:rgba(255,255,255,0.03)}
        .modal-bg{position:fixed;inset:0;background:rgba(12,18,34,0.8);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
        .modal-bg.show{display:flex}
        .modal-box{background:#101935;border:1px solid rgba(255,255,255,0.06);border-radius:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(212,168,83,0.15);border:1px solid rgba(212,168,83,0.2);color:#D4A853;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:600;z-index:9999;transition:opacity 0.3s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp 0.4s ease forwards}
        @keyframes spin{to{transform:rotate(360deg)}}.animate-spin{animation:spin 1s linear infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.animate-pulse{animation:pulse 2s cubic-bezier(0.4,0,.6,1) infinite}
    </style>
</head>
<body class="antialiased">

<div id="loadingScreen" class="fixed inset-0 bg-[#0C1222] z-[9999] flex items-center justify-center transition-opacity duration-300">
    <div class="text-center">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-500 to-yellow-600 flex items-center justify-center mx-auto mb-3"><span class="text-[#0C1222] font-black text-sm">D</span></div>
        <p class="text-white/20 text-xs">Yetki kontrol ediliyor...</p>
    </div>
</div>

<header class="fixed top-0 left-0 right-0 z-50 py-3" style="background:rgba(12,18,34,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.03)">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-yellow-600 flex items-center justify-center"><span class="text-[#0C1222] font-black text-xs">D</span></div>
            <span class="text-white/60 font-bold text-sm">Admin</span>
            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-400/60">YÖNETİCİ</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="../index.html" class="text-white/20 text-xs hover:text-white/40 transition-colors">Siteye Git</a>
            <button onclick="doLogout()" class="text-red-400/40 text-xs font-semibold hover:text-red-400 transition-colors">Çıkış</button>
        </div>
    </div>
</header>

<main class="pt-20 pb-10 min-h-screen">
    <div class="max-w-7xl mx-auto px-4">

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 fade-up">
            <div class="glass rounded-xl p-4"><div class="text-2xl font-black text-[#D4A853]" id="statOrders">-</div><div class="text-[10px] text-white/20 font-medium mt-1">Sipariş</div></div>
            <div class="glass rounded-xl p-4"><div class="text-2xl font-black text-amber-400/60" id="statPending">-</div><div class="text-[10px] text-white/20 font-medium mt-1">Bekleyen</div></div>
            <div class="glass rounded-xl p-4"><div class="text-2xl font-black text-emerald-400/60" id="statSites">-</div><div class="text-[10px] text-white/20 font-medium mt-1">Aktif Site</div></div>
            <div class="glass rounded-xl p-4"><div class="text-2xl font-black text-indigo-400/60" id="statUsers">-</div><div class="text-[10px] text-white/20 font-medium mt-1">Müşteri</div></div>
        </div>

        <div class="flex gap-2 mb-5 overflow-x-auto pb-2 fade-up">
            <button onclick="switchTab('orders')" class="tab-btn active" id="tabOrders">📦 Siparişler</button>
            <button onclick="switchTab('sites')" class="tab-btn" id="tabSites">🌐 Siteler</button>
            <button onclick="switchTab('payments')" class="tab-btn" id="tabPayments">💳 Ödemeler</button>
            <button onclick="switchTab('customers')" class="tab-btn" id="tabCustomers">👥 Müşteriler</button>
        </div>

        <div id="sectionOrders"><div id="ordersContent" class="space-y-3"></div></div>
        <div id="sectionSites" class="hidden"><div id="sitesContent" class="space-y-3"></div></div>
        <div id="sectionPayments" class="hidden"><div id="paymentsContent" class="space-y-3"></div></div>
        <div id="sectionCustomers" class="hidden"><div id="customersContent" class="space-y-3"></div></div>
    </div>
</main>

<div id="deliverModal" class="modal-bg" onclick="if(event.target===this)closeDeliver()">
    <div class="modal-box">
        <div class="p-5 border-b border-white/[0.04]"><h3 class="text-sm font-bold text-white">✅ Siparişi Teslim Et</h3><p id="deliverInfo" class="text-white/20 text-[10px] mt-1"></p></div>
        <div class="p-5 space-y-4">
            <div class="glass rounded-xl p-3"><p class="text-amber-400/50 text-[10px] font-semibold">Teslim edildiğinde müşteri panelinde site görünecek ve ödeme süreci başlayacak.</p></div>
            <div><label class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-1">Site Adı *</label><input type="text" id="dSiteName" placeholder="Ahmet'in Berber Salonu" class="input-sm w-full"></div>
            <div><label class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-1">Site URL *</label><input type="url" id="dSiteUrl" placeholder="https://ahmet-berber.vercel.app" class="input-sm w-full"></div>
            <div><label class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-1">Bakım Ücreti (CustomSite için)</label><input type="number" id="dMaintenancePrice" placeholder="5000" class="input-sm w-full"></div>
            <div id="deliverErr" class="hidden p-3 rounded-xl border border-red-500/20 bg-red-500/5 text-red-400/60 text-[10px] font-semibold"></div>
            <button onclick="doDeliver()" id="deliverBtn" class="w-full btn-gold py-3 rounded-xl text-xs font-bold">Teslim Et</button>
        </div>
    </div>
</div>

<script type="module">
    import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import{getFirestore,doc,getDoc,getDocs,updateDoc,addDoc,collection,query,where,serverTimestamp,Timestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app=initializeApp({apiKey:"AIzaSyBZgHuXY6njck4Kqn_rnCoX67Ssw6b9ig4",authDomain:"dijital-pazar-3cc34.firebaseapp.com",projectId:"dijital-pazar-3cc34",storageBucket:"dijital-pazar-3cc34.firebasestorage.app",messagingSenderId:"519713206128",appId:"1:519713206128:web:4d1f541d1b469eeb8069b5"});
    const auth=getAuth(app),db=getFirestore(app);

    let allOrders=[],allSites=[],allPayments=[],allCustomers=[];
    let deliverOrderId=null,deliverOrderData=null;

    onAuthStateChanged(auth,async(user)=>{
        if(!user){location.href='giris.html';return;}
        const snap=await getDoc(doc(db,"users",user.uid));
        if(!snap.exists()||snap.data().role!=='admin'){await signOut(auth);location.href='giris.html';return;}
        await loadAll();
        const l=document.getElementById('loadingScreen');l.style.opacity='0';setTimeout(()=>l.style.display='none',300);
    });

    async function loadAll(){await Promise.all([loadOrders(),loadSites(),loadPayments(),loadCustomers()]);}

    async function loadOrders(){
        const snap=await getDocs(collection(db,"orders"));
        allOrders=[];snap.forEach(d=>allOrders.push({id:d.id,...d.data()}));
        allOrders.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        document.getElementById('statOrders').textContent=allOrders.length;
        document.getElementById('statPending').textContent=allOrders.filter(o=>o.status==='pending'||o.status==='processing').length;
        renderOrders();
    }

    function renderOrders(){
        const el=document.getElementById('ordersContent');
        if(!allOrders.length){el.innerHTML='<div class="glass rounded-xl p-8 text-center text-white/15 text-xs">Sipariş yok</div>';return;}
        const sm={pending:{l:'Talep Alındı',c:'bg-yellow-500/10 text-yellow-400/60'},processing:{l:'Hazırlanıyor',c:'bg-blue-500/10 text-blue-400/60'},delivered:{l:'Teslim Edildi',c:'bg-emerald-500/10 text-emerald-400/60'},cancelled:{l:'İptal',c:'bg-white/5 text-white/20'}};
        let h='';
        allOrders.forEach(o=>{
            const s=sm[o.status]||sm.pending;
            const date=o.createdAt?new Date(o.createdAt.seconds*1000).toLocaleDateString('tr-TR',{day:'numeric',month:'short'}):'-';
            h+=`<div class="card"><div class="flex flex-col lg:flex-row lg:items-center gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="w-9 h-9 glass rounded-lg flex items-center justify-center text-lg flex-shrink-0">${o.productIcon||'📦'}</div>
                    <div class="min-w-0"><div class="font-bold text-white/50 text-xs truncate">${o.productName||'Ürün'}</div><div class="text-[10px] text-white/15 truncate">🏢 ${o.businessName||'-'} · ${o.userEmail||''} · ${date}</div><div class="text-[10px] text-white/15">${o.packageName||''} · <strong>${parseInt(o.price||0).toLocaleString('tr-TR')}₺${o.isCustom?'':'/ay'}</strong></div>${o.note?`<div class="text-[9px] text-white/10 mt-1">📝 ${o.note}</div>`:''}</div>
                </div>
                <div class="flex items-center gap-2 flex-wrap flex-shrink-0">
                    <select onchange="changeOrderStatus('${o.id}',this.value)" class="input-sm text-[10px] font-bold ${s.c}" style="min-width:130px;background:rgba(255,255,255,0.03)">
                        <option value="pending" ${o.status==='pending'?'selected':''}>⏳ Talep Alındı</option>
                        <option value="processing" ${o.status==='processing'?'selected':''}>⚙️ Hazırlanıyor</option>
                        <option value="delivered" ${o.status==='delivered'?'selected':''} disabled>✅ Teslim Edildi</option>
                        <option value="cancelled" ${o.status==='cancelled'?'selected':''}>❌ İptal</option>
                    </select>
                    ${o.status==='processing'?`<button onclick='openDeliverModal("${o.id}")' class="btn-gold px-3 py-1.5 rounded-lg text-[10px]">✅ Teslim Et</button>`:''}
                </div>
            </div></div>`;
        });
        el.innerHTML=h;
    }

    window.changeOrderStatus=async function(id,s){
        if(s==='delivered')return;
        try{await updateDoc(doc(db,"orders",id),{status:s,updatedAt:serverTimestamp()});toast('Sipariş güncellendi');await loadOrders();}catch(e){alert('Hata: '+e.message);}
    };

    window.openDeliverModal=function(id){
        const o=allOrders.find(x=>x.id===id);if(!o)return;
        deliverOrderId=id;deliverOrderData=o;
        document.getElementById('deliverInfo').textContent=`${o.productName} · ${o.businessName||''} · ${o.userEmail||''}`;
        document.getElementById('dSiteName').value=o.businessName||'';
        document.getElementById('dSiteUrl').value='';
        document.getElementById('dMaintenancePrice').value=o.isCustom?'5000':'';
        document.getElementById('deliverErr').classList.add('hidden');
        document.getElementById('deliverModal').classList.add('show');
    };

    window.closeDeliver=function(){document.getElementById('deliverModal').classList.remove('show');};

    window.doDeliver=async function(){
        const siteName=document.getElementById('dSiteName').value.trim();
        const siteUrl=document.getElementById('dSiteUrl').value.trim();
        const maintenancePrice=document.getElementById('dMaintenancePrice').value.trim();
        const errEl=document.getElementById('deliverErr');
        if(!siteName||!siteUrl){errEl.textContent='Site adı ve URL zorunludur.';errEl.classList.remove('hidden');return;}
        const btn=document.getElementById('deliverBtn');btn.disabled=true;btn.textContent='İşleniyor...';errEl.classList.add('hidden');
        const o=deliverOrderData;const now=new Date();
        // İlk sipariş mi kontrol et
        const existingOrders=allOrders.filter(x=>x.userId===o.userId&&x.status==='delivered');
        const isFirstOrder=existingOrders.length===0;
        const trialEnd=isFirstOrder?new Date(now.getTime()+14*24*60*60*1000):new Date(now.getTime()+3*24*60*60*1000);
        try{
            await updateDoc(doc(db,"orders",deliverOrderId),{status:'delivered',deliveredAt:serverTimestamp()});
            // Site oluştur
            const siteData={userId:o.userId,userEmail:o.userEmail,orderId:deliverOrderId,siteName:siteName,siteUrl:siteUrl,icon:o.productIcon||'🌐',productName:o.productName,packageName:o.packageName,price:o.price,isCustom:o.isCustom||false,status:'trial',trialStart:serverTimestamp(),trialEnd:Timestamp.fromDate(trialEnd),createdAt:serverTimestamp()};
            if(o.isCustom&&maintenancePrice){siteData.maintenancePrice=maintenancePrice;siteData.maintenanceAccepted=null;}
            await addDoc(collection(db,"sites"),siteData);
            // Ödeme oluştur
            await addDoc(collection(db,"payments"),{userId:o.userId,userEmail:o.userEmail,orderId:deliverOrderId,amount:o.price,description:isFirstOrder?'14 Gün Ücretsiz Deneme - '+o.productName:'İlk Ödeme (3 gün) - '+o.productName,status:isFirstOrder?'trial':'unpaid',dueDate:Timestamp.fromDate(trialEnd),createdAt:serverTimestamp()});
            closeDeliver();toast('Sipariş teslim edildi!');await loadAll();
        }catch(e){console.error(e);errEl.textContent='Hata: '+e.message;errEl.classList.remove('hidden');}
        finally{btn.disabled=false;btn.textContent='Teslim Et';}
    };

    async function loadSites(){
        const snap=await getDocs(collection(db,"sites"));
        allSites=[];snap.forEach(d=>allSites.push({id:d.id,...d.data()}));
        allSites.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        document.getElementById('statSites').textContent=allSites.filter(s=>s.status==='active'||s.status==='trial').length;
        const el=document.getElementById('sitesContent');
        if(!allSites.length){el.innerHTML='<div class="glass rounded-xl p-8 text-center text-white/15 text-xs">Site yok</div>';return;}
        let h='';
        allSites.forEach(s=>{
            h+=`<div class="card"><div class="flex flex-col lg:flex-row lg:items-center gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="w-9 h-9 glass rounded-lg flex items-center justify-center text-lg flex-shrink-0">${s.icon||'🌐'}</div>
                    <div class="min-w-0"><div class="font-bold text-white/50 text-xs">${s.siteName||'Site'}</div><div class="text-[10px] text-white/15">${s.productName||''} · ${s.userEmail||''}</div>${s.siteUrl?`<a href="${s.siteUrl}" target="_blank" class="text-[#D4A853]/40 text-[10px] hover:text-[#D4A853]/60 break-all">${s.siteUrl}</a>`:''}</div>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="font-bold text-white/30 text-xs">${parseInt(s.price||0).toLocaleString('tr-TR')}₺</span>
                    <select onchange="changeSiteStatus('${s.id}',this.value)" class="input-sm text-[10px] font-bold" style="min-width:120px;background:rgba(255,255,255,0.03)">
                        <option value="trial" ${s.status==='trial'?'selected':''}>🎯 Deneme</option>
                        <option value="active" ${s.status==='active'?'selected':''}>🟢 Aktif</option>
                        <option value="maintenance" ${s.status==='maintenance'?'selected':''}>🔧 Bakımda</option>
                        <option value="suspended" ${s.status==='suspended'?'selected':''}>⛔ Askıda</option>
                        <option value="cancelled" ${s.status==='cancelled'?'selected':''}>❌ Kapalı</option>
                    </select>
                </div>
            </div></div>`;
        });
        el.innerHTML=h;
    }

    window.changeSiteStatus=async function(id,s){
        try{await updateDoc(doc(db,"sites",id),{status:s,updatedAt:serverTimestamp()});toast('Site güncellendi');await loadSites();}catch(e){alert('Hata: '+e.message);}
    };

    async function loadPayments(){
        const snap=await getDocs(collection(db,"payments"));
        allPayments=[];snap.forEach(d=>allPayments.push({id:d.id,...d.data()}));
        allPayments.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        const el=document.getElementById('paymentsContent');
        if(!allPayments.length){el.innerHTML='<div class="glass rounded-xl p-8 text-center text-white/15 text-xs">Ödeme kaydı yok</div>';return;}
        let h='';
        allPayments.forEach(p=>{
            const due=p.dueDate?p.dueDate.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}):'-';
            h+=`<div class="card"><div class="flex flex-col lg:flex-row lg:items-center gap-3">
                <div class="flex-1 min-w-0"><div class="font-bold text-white/50 text-xs">${p.description||'Ödeme'}</div><div class="text-[10px] text-white/15">${p.userEmail||''} · Son: ${due}</div></div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="font-bold text-white/30 text-xs">${parseInt(p.amount||0).toLocaleString('tr-TR')}₺</span>
                    <select onchange="changePaymentStatus('${p.id}',this.value)" class="input-sm text-[10px] font-bold" style="min-width:120px;background:rgba(255,255,255,0.03)">
                        <option value="trial" ${p.status==='trial'?'selected':''}>🎁 Deneme</option>
                        <option value="unpaid" ${p.status==='unpaid'?'selected':''}>❌ Ödenmedi</option>
                        <option value="paid" ${p.status==='paid'?'selected':''}>✅ Ödendi</option>
                        <option value="overdue" ${p.status==='overdue'?'selected':''}>⚠️ Gecikmiş</option>
                    </select>
                </div>
            </div></div>`;
        });
        el.innerHTML=h;
    }

    window.changePaymentStatus=async function(id,s){
        try{await updateDoc(doc(db,"payments",id),{status:s,updatedAt:serverTimestamp()});toast('Ödeme güncellendi');await loadPayments();}catch(e){alert('Hata: '+e.message);}
    };

    async function loadCustomers(){
        const snap=await getDocs(query(collection(db,"users"),where("role","==","customer")));
        allCustomers=[];snap.forEach(d=>allCustomers.push({id:d.id,...d.data()}));
        document.getElementById('statUsers').textContent=allCustomers.length;
        const el=document.getElementById('customersContent');
        if(!allCustomers.length){el.innerHTML='<div class="glass rounded-xl p-8 text-center text-white/15 text-xs">Müşteri yok</div>';return;}
        let h='';
        allCustomers.forEach(c=>{
            const date=c.createdAt?c.createdAt.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short'}):'-';
            const oc=allOrders.filter(o=>o.userId===c.id).length;
            const sc=allSites.filter(s=>s.userId===c.id).length;
            h+=`<div class="card"><div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-amber-500/20 to-yellow-600/10 rounded-lg flex items-center justify-center flex-shrink-0"><span class="text-[#D4A853]/60 font-bold text-xs">${(c.firstName||'?').charAt(0).toUpperCase()}</span></div>
                <div class="flex-1 min-w-0"><div class="font-bold text-white/50 text-xs">${c.fullName||'-'}${c.companyName?' · '+c.companyName:''}</div><div class="text-[10px] text-white/15">${c.email||''} · ${c.phone||''}</div></div>
                <div class="flex items-center gap-4 flex-shrink-0 text-[10px] text-white/20">
                    <div class="text-center"><div class="font-bold text-white/40">${oc}</div><div>sipariş</div></div>
                    <div class="text-center"><div class="font-bold text-white/40">${sc}</div><div>site</div></div>
                    <div class="text-white/10">${date}</div>
                </div>
            </div></div>`;
        });
        el.innerHTML=h;
    }

    window.doLogout=async function(){await signOut(auth);location.href='giris.html';};
    function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);}
    window.toast=toast;
</script>

<script>
    function switchTab(tab){
        ['orders','sites','payments','customers'].forEach(t=>{
            const s=document.getElementById('section'+t.charAt(0).toUpperCase()+t.slice(1));
            const b=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
            if(s)s.classList.add('hidden');if(b)b.classList.remove('active');
        });
        document.getElementById('section'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.remove('hidden');
        document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
    }
</script>
</body>
</html>
