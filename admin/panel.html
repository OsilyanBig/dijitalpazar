<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | XXX Yazılım</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']},colors:{dark:'#0A0E27'}}}}</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif}
        .btn-primary{background:linear-gradient(135deg,#4F46E5,#7C3AED);transition:all 0.3s}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 25px -5px rgba(79,70,229,0.4)}
        .tab-btn{padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:none;outline:none;transition:all 0.2s;white-space:nowrap}
        .tab-btn.active{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:white;box-shadow:0 4px 15px rgba(79,70,229,0.3)}
        .tab-btn:not(.active){background:#F1F5F9;color:#64748B}.tab-btn:not(.active):hover{background:#E2E8F0}
        .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
        .input-sm{padding:8px 12px;border-radius:8px;background:#F8FAFC;border:1.5px solid #E2E8F0;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all 0.2s}
        .input-sm:focus{border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
        .card{background:white;border-radius:16px;border:1px solid #E2E8F0;padding:16px;transition:all 0.2s}
        .card:hover{border-color:#C7D2FE;box-shadow:0 4px 20px -4px rgba(0,0,0,0.08)}
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
        .modal-bg.show{display:flex}
        .modal-box{background:white;border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
        @keyframes spin{to{transform:rotate(360deg)}}.animate-spin{animation:spin 1s linear infinite}
        @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp 0.4s ease forwards}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:12px 24px;border-radius:16px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 10px 40px rgba(0,0,0,0.2);transition:opacity 0.3s}
    </style>
</head>
<body class="bg-[#F1F5F9] text-gray-900 antialiased">

<!-- Loading -->
<div id="loadingScreen" class="fixed inset-0 bg-dark z-[9999] flex items-center justify-center transition-opacity duration-300">
    <div class="text-center">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center mx-auto mb-3">
            <span class="text-white font-black text-xl">X</span>
        </div>
        <p class="text-white/50 text-sm">Yetki kontrol ediliyor...</p>
    </div>
</div>

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-dark/95 backdrop-blur-xl border-b border-white/5 py-3">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-12">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center">
                <span class="text-white font-black text-sm">X</span>
            </div>
            <span class="text-white font-bold text-sm">Admin Panel</span>
            <span class="bg-red-500/20 text-red-400 text-[10px] font-bold px-2 py-0.5 rounded-full">YÖNETİCİ</span>
        </div>
        <div class="flex items-center gap-3">
            <a href="../index.html" class="text-white/40 text-xs hover:text-white/70">Siteye Git</a>
            <button onclick="doLogout()" class="bg-red-500/10 text-red-400 hover:bg-red-500/20 px-3 py-1.5 rounded-lg text-xs font-semibold">Çıkış</button>
        </div>
    </div>
</header>


<!-- Main -->
<main class="pt-24 pb-10 min-h-screen">
    <div class="max-w-7xl mx-auto px-4">

        <!-- Stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8 fade-up">
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-3xl font-black text-indigo-600" id="statOrders">-</div>
                <div class="text-xs text-gray-500 font-semibold mt-1">Toplam Sipariş</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-3xl font-black text-amber-600" id="statPending">-</div>
                <div class="text-xs text-gray-500 font-semibold mt-1">Bekleyen</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-3xl font-black text-green-600" id="statSites">-</div>
                <div class="text-xs text-gray-500 font-semibold mt-1">Aktif Site</div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-5">
                <div class="text-3xl font-black text-purple-600" id="statUsers">-</div>
                <div class="text-xs text-gray-500 font-semibold mt-1">Müşteri</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 fade-up">
            <button onclick="switchTab('orders')" class="tab-btn active" id="tabOrders">📦 Siparişler</button>
            <button onclick="switchTab('sites')" class="tab-btn" id="tabSites">🌐 Siteler</button>
            <button onclick="switchTab('payments')" class="tab-btn" id="tabPayments">💳 Ödemeler</button>
            <button onclick="switchTab('customers')" class="tab-btn" id="tabCustomers">👥 Müşteriler</button>
        </div>


        <!-- SİPARİŞLER -->
        <div id="sectionOrders">
            <div id="ordersContent" class="space-y-3"></div>
        </div>

        <!-- SİTELER -->
        <div id="sectionSites" class="hidden">
            <div id="sitesContent" class="space-y-3"></div>
        </div>

        <!-- ÖDEMELER -->
        <div id="sectionPayments" class="hidden">
            <div id="paymentsContent" class="space-y-3"></div>
        </div>

        <!-- MÜŞTERİLER -->
        <div id="sectionCustomers" class="hidden">
            <div id="customersContent" class="space-y-3"></div>
        </div>

    </div>
</main>


<!-- TESLİM MODAL -->
<div id="deliverModal" class="modal-bg" onclick="if(event.target===this)closeDeliver()">
    <div class="modal-box">
        <div class="bg-gradient-to-r from-green-500 to-emerald-600 p-5 rounded-t-2xl">
            <h3 class="text-white font-bold text-lg">✅ Siparişi Teslim Et</h3>
            <p id="deliverInfo" class="text-white/70 text-xs mt-1"></p>
        </div>
        <div class="p-6 space-y-4">
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
                <p class="text-amber-700 text-sm font-semibold">⚠️ Teslim edildikten sonra:</p>
                <ul class="text-amber-600 text-xs mt-1 space-y-1">
                    <li>• Müşteri panelinde site görünecek</li>
                    <li>• 14 günlük trial başlayacak</li>
                    <li>• Ödeme kaydı oluşturulacak</li>
                </ul>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Site Adı *</label>
                <input type="text" id="dSiteName" placeholder="Ahmet'in Berber Salonu" class="input-sm w-full">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Site URL *</label>
                <input type="url" id="dSiteUrl" placeholder="https://ahmet-berber.vercel.app" class="input-sm w-full">
            </div>
            <div id="deliverErr" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm font-semibold"></div>
            <button onclick="doDeliver()" id="deliverBtn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-colors">
                Teslim Et & Trial Başlat
            </button>
        </div>
    </div>
</div>


<!-- FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, getDocs, updateDoc, addDoc,
        collection, query, where, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyBZgHuXY6njck4Kqn_rnCoX67Ssw6b9ig4",
        authDomain: "dijital-pazar-3cc34.firebaseapp.com",
        projectId: "dijital-pazar-3cc34",
        storageBucket: "dijital-pazar-3cc34.firebasestorage.app",
        messagingSenderId: "519713206128",
        appId: "1:519713206128:web:4d1f541d1b469eeb8069b5"
    });

    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Global data
    let allOrders = [], allSites = [], allPayments = [], allCustomers = [];
    let deliverOrderId = null, deliverOrderData = null;

    // Admin kontrolü
    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.href = 'giris.html'; return; }
        const snap = await getDoc(doc(db, "users", user.uid));
        if (!snap.exists() || snap.data().role !== 'admin') {
            await signOut(auth); location.href = 'giris.html'; return;
        }
        await loadAll();
        document.getElementById('loadingScreen').style.opacity = '0';
        setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 300);
    });

    async function loadAll() {
        await Promise.all([loadOrders(), loadSites(), loadPayments(), loadCustomers()]);
    }

    // ===== SİPARİŞLER =====
    async function loadOrders() {
        const snap = await getDocs(collection(db, "orders"));
        allOrders = [];
        snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
        allOrders.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        document.getElementById('statOrders').textContent = allOrders.length;
        document.getElementById('statPending').textContent = allOrders.filter(o => o.status === 'pending' || o.status === 'processing').length;

        renderOrders();
    }

    function renderOrders() {
        const el = document.getElementById('ordersContent');
        if (allOrders.length === 0) { el.innerHTML = '<div class="card text-center text-gray-400 py-8">Sipariş yok</div>'; return; }

        const statusOpts = {
            pending:    { label: '⏳ Talep Alındı',  bg: 'bg-yellow-100 text-yellow-700' },
            processing: { label: '⚙️ Hazırlanıyor',  bg: 'bg-blue-100 text-blue-700' },
            delivered:  { label: '✅ Teslim Edildi', bg: 'bg-green-100 text-green-700' },
            cancelled:  { label: '❌ İptal Edildi',  bg: 'bg-gray-100 text-gray-600' }
        };

        let html = '';
        allOrders.forEach(o => {
            const s = statusOpts[o.status] || statusOpts.pending;
            const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }) : '';

            html += `
            <div class="card">
                <div class="flex flex-col lg:flex-row lg:items-center gap-4">
                    <!-- Bilgi -->
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="w-11 h-11 bg-indigo-50 rounded-xl flex items-center justify-center text-xl flex-shrink-0">${o.productIcon || '📦'}</div>
                        <div class="min-w-0">
                            <div class="font-bold text-sm text-gray-900 truncate">${o.productName || 'Ürün'}</div>
                            <div class="text-xs text-gray-400 truncate">🏢 ${o.businessName || '-'} · ${o.userEmail || ''} · ${date}</div>
                            <div class="text-xs text-gray-400">${o.packageName || ''} Paketi · <strong>${parseInt(o.price || 0).toLocaleString('tr-TR')}₺${o.isCustom ? '' : '/ay'}</strong></div>
                            ${o.note ? `<div class="text-xs text-gray-300 mt-1">📝 ${o.note}</div>` : ''}
                        </div>
                    </div>

                    <!-- Durum + Aksiyonlar -->
                    <div class="flex items-center gap-2 flex-wrap flex-shrink-0">
                        <!-- Durum Seçici -->
                        <select onchange="changeOrderStatus('${o.id}', this.value)" class="input-sm text-xs font-bold ${s.bg}" style="min-width:140px">
                            <option value="pending"    ${o.status === 'pending' ? 'selected' : ''}>⏳ Talep Alındı</option>
                            <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>⚙️ Hazırlanıyor</option>
                            <option value="delivered"  ${o.status === 'delivered' ? 'selected' : ''} disabled>✅ Teslim Edildi</option>
                            <option value="cancelled"  ${o.status === 'cancelled' ? 'selected' : ''}>❌ İptal</option>
                        </select>

                        ${o.status === 'processing' ? `
                        <button onclick='openDeliverModal("${o.id}")' class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-green-600 transition-colors flex items-center gap-1">
                            ✅ Teslim Et
                        </button>` : ''}
                    </div>
                </div>
            </div>`;
        });
        el.innerHTML = html;
    }

    // Sipariş durumu değiştir (teslim hariç)
    window.changeOrderStatus = async function(id, newStatus) {
        if (newStatus === 'delivered') return; // Teslim modaldan yapılır
        try {
            await updateDoc(doc(db, "orders", id), { status: newStatus, updatedAt: serverTimestamp() });
            toast('✅ Sipariş durumu güncellendi');
            await loadOrders();
        } catch (e) { alert('Hata: ' + e.message); }
    };

    // Teslim modal aç
    window.openDeliverModal = function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        deliverOrderId   = orderId;
        deliverOrderData = order;

        document.getElementById('deliverInfo').textContent = `${order.productName} · ${order.businessName || ''} · ${order.userEmail || ''}`;
        document.getElementById('dSiteName').value = order.businessName || '';
        document.getElementById('dSiteUrl').value  = '';
        document.getElementById('deliverErr').classList.add('hidden');

        document.getElementById('deliverModal').classList.add('show');
    };

    window.closeDeliver = function() {
        document.getElementById('deliverModal').classList.remove('show');
    };

    // Teslim et
    window.doDeliver = async function() {
        const siteName = document.getElementById('dSiteName').value.trim();
        const siteUrl  = document.getElementById('dSiteUrl').value.trim();
        const errEl    = document.getElementById('deliverErr');

        if (!siteName || !siteUrl) {
            errEl.textContent = '❌ Site adı ve URL zorunludur!';
            errEl.classList.remove('hidden');
            return;
        }

        const btn = document.getElementById('deliverBtn');
        btn.disabled = true;
        btn.textContent = 'İşleniyor...';
        errEl.classList.add('hidden');

        const order    = deliverOrderData;
        const now      = new Date();
        const trialEnd = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000);

        try {
            // 1. Sipariş → delivered
            await updateDoc(doc(db, "orders", deliverOrderId), {
                status: 'delivered',
                deliveredAt: serverTimestamp()
            });

            // 2. Sites → oluştur
            await addDoc(collection(db, "sites"), {
                userId:      order.userId,
                userEmail:   order.userEmail,
                orderId:     deliverOrderId,
                siteName:    siteName,
                siteUrl:     siteUrl,
                icon:        order.productIcon || '🌐',
                productName: order.productName,
                packageName: order.packageName,
                price:       order.price,
                isCustom:    order.isCustom || false,
                status:      'trial',
                trialStart:  serverTimestamp(),
                trialEnd:    Timestamp.fromDate(trialEnd),
                createdAt:   serverTimestamp()
            });

            // 3. Payments → trial kaydı
            await addDoc(collection(db, "payments"), {
                userId:      order.userId,
                userEmail:   order.userEmail,
                orderId:     deliverOrderId,
                amount:      order.price,
                description: '14 Gün Ücretsiz Deneme - ' + order.productName,
                status:      'trial',
                dueDate:     Timestamp.fromDate(trialEnd),
                createdAt:   serverTimestamp()
            });

            closeDeliver();
            toast('✅ Sipariş teslim edildi! Trial başlatıldı.');
            await loadAll();

        } catch (e) {
            console.error(e);
            errEl.textContent = '❌ Hata: ' + e.message;
            errEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Teslim Et & Trial Başlat';
        }
    };


    // ===== SİTELER =====
    async function loadSites() {
        const snap = await getDocs(collection(db, "sites"));
        allSites = [];
        snap.forEach(d => allSites.push({ id: d.id, ...d.data() }));
        allSites.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        document.getElementById('statSites').textContent = allSites.filter(s => s.status === 'active' || s.status === 'trial').length;

        const el = document.getElementById('sitesContent');
        if (allSites.length === 0) { el.innerHTML = '<div class="card text-center text-gray-400 py-8">Site yok</div>'; return; }

        const statusOpts = {
            trial:       { label: '🎯 Deneme',  bg: 'bg-indigo-100 text-indigo-700' },
            active:      { label: '🟢 Aktif',   bg: 'bg-green-100 text-green-700' },
            maintenance: { label: '🔧 Bakımda', bg: 'bg-amber-100 text-amber-700' },
            suspended:   { label: '⛔ Askıda',  bg: 'bg-red-100 text-red-700' },
            cancelled:   { label: '❌ Kapalı',  bg: 'bg-gray-100 text-gray-600' }
        };

        let html = '';
        allSites.forEach(s => {
            const st = statusOpts[s.status] || statusOpts.trial;
            html += `
            <div class="card">
                <div class="flex flex-col lg:flex-row lg:items-center gap-4">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="w-11 h-11 bg-indigo-50 rounded-xl flex items-center justify-center text-xl flex-shrink-0">${s.icon || '🌐'}</div>
                        <div class="min-w-0">
                            <div class="font-bold text-sm text-gray-900">${s.siteName || 'Site'}</div>
                            <div class="text-xs text-gray-400">${s.productName || ''} · ${s.userEmail || ''}</div>
                            ${s.siteUrl ? `<a href="${s.siteUrl}" target="_blank" class="text-indigo-500 text-xs hover:underline break-all">${s.siteUrl}</a>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="font-bold text-sm">${parseInt(s.price || 0).toLocaleString('tr-TR')}₺</span>
                        <select onchange="changeSiteStatus('${s.id}', this.value)" class="input-sm text-xs font-bold ${st.bg}" style="min-width:130px">
                            <option value="trial"       ${s.status === 'trial' ? 'selected' : ''}>🎯 Deneme</option>
                            <option value="active"      ${s.status === 'active' ? 'selected' : ''}>🟢 Aktif</option>
                            <option value="maintenance" ${s.status === 'maintenance' ? 'selected' : ''}>🔧 Bakımda</option>
                            <option value="suspended"   ${s.status === 'suspended' ? 'selected' : ''}>⛔ Askıda</option>
                            <option value="cancelled"   ${s.status === 'cancelled' ? 'selected' : ''}>❌ Kapalı</option>
                        </select>
                    </div>
                </div>
            </div>`;
        });
        el.innerHTML = html;
    }

    window.changeSiteStatus = async function(id, newStatus) {
        try {
            await updateDoc(doc(db, "sites", id), { status: newStatus, updatedAt: serverTimestamp() });
            toast('✅ Site durumu güncellendi');
            await loadSites();
        } catch (e) { alert('Hata: ' + e.message); }
    };


    // ===== ÖDEMELER =====
    async function loadPayments() {
        const snap = await getDocs(collection(db, "payments"));
        allPayments = [];
        snap.forEach(d => allPayments.push({ id: d.id, ...d.data() }));
        allPayments.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        const el = document.getElementById('paymentsContent');
        if (allPayments.length === 0) { el.innerHTML = '<div class="card text-center text-gray-400 py-8">Ödeme kaydı yok</div>'; return; }

        const statusOpts = {
            trial:  { label: '🎁 Deneme',   bg: 'bg-indigo-100 text-indigo-700' },
            unpaid: { label: '❌ Ödenmedi', bg: 'bg-red-100 text-red-700' },
            paid:   { label: '✅ Ödendi',   bg: 'bg-green-100 text-green-700' },
            overdue:{ label: '⚠️ Gecikmiş', bg: 'bg-orange-100 text-orange-700' }
        };

        let html = '';
        allPayments.forEach(p => {
            const ps  = statusOpts[p.status] || statusOpts.unpaid;
            const due = p.dueDate ? p.dueDate.toDate().toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';

            html += `
            <div class="card">
                <div class="flex flex-col lg:flex-row lg:items-center gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm text-gray-900">${p.description || 'Ödeme'}</div>
                        <div class="text-xs text-gray-400">${p.userEmail || ''} · Son tarih: ${due}</div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="font-bold text-sm">${parseInt(p.amount || 0).toLocaleString('tr-TR')}₺</span>
                        <select onchange="changePaymentStatus('${p.id}', this.value)" class="input-sm text-xs font-bold ${ps.bg}" style="min-width:130px">
                            <option value="trial"  ${p.status === 'trial' ? 'selected' : ''}>🎁 Deneme</option>
                            <option value="unpaid" ${p.status === 'unpaid' ? 'selected' : ''}>❌ Ödenmedi</option>
                            <option value="paid"   ${p.status === 'paid' ? 'selected' : ''}>✅ Ödendi</option>
                            <option value="overdue" ${p.status === 'overdue' ? 'selected' : ''}>⚠️ Gecikmiş</option>
                        </select>
                    </div>
                </div>
            </div>`;
        });
        el.innerHTML = html;
    }

    window.changePaymentStatus = async function(id, newStatus) {
        try {
            await updateDoc(doc(db, "payments", id), { status: newStatus, updatedAt: serverTimestamp() });
            toast('✅ Ödeme durumu güncellendi');
            await loadPayments();
        } catch (e) { alert('Hata: ' + e.message); }
    };


    // ===== MÜŞTERİLER =====
    async function loadCustomers() {
        const snap = await getDocs(query(collection(db, "users"), where("role", "==", "customer")));
        allCustomers = [];
        snap.forEach(d => allCustomers.push({ id: d.id, ...d.data() }));

        document.getElementById('statUsers').textContent = allCustomers.length;

        const el = document.getElementById('customersContent');
        if (allCustomers.length === 0) { el.innerHTML = '<div class="card text-center text-gray-400 py-8">Müşteri yok</div>'; return; }

        let html = '';
        allCustomers.forEach(c => {
            const date = c.createdAt ? c.createdAt.toDate().toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
            const orderCount = allOrders.filter(o => o.userId === c.id).length;
            const siteCount  = allSites.filter(s => s.userId === c.id).length;

            html += `
            <div class="card">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center flex-shrink-0">
                        <span class="text-white font-bold text-sm">${(c.firstName || '?').charAt(0).toUpperCase()}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm text-gray-900">${c.fullName || '-'}</div>
                        <div class="text-xs text-gray-400">${c.email || ''} · ${c.phone || ''}</div>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0 text-xs">
                        <div class="text-center">
                            <div class="font-bold text-gray-900">${orderCount}</div>
                            <div class="text-gray-400">sipariş</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-gray-900">${siteCount}</div>
                            <div class="text-gray-400">site</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-gray-400">${date}</div>
                            <div class="text-gray-400">kayıt</div>
                        </div>
                    </div>
                </div>
            </div>`;
        });
        el.innerHTML = html;
    }


    // Logout
    window.doLogout = async function() {
        await signOut(auth);
        location.href = 'giris.html';
    };

    // Toast
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
    }
    window.toast = toast;
</script>

<script>
    function switchTab(tab) {
        ['orders', 'sites', 'payments', 'customers'].forEach(t => {
            const sec = document.getElementById('section' + t.charAt(0).toUpperCase() + t.slice(1));
            const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
            if (sec) sec.classList.add('hidden');
            if (btn) btn.classList.remove('active');
        });
        document.getElementById('section' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    }
</script>
</body>
</html>
